<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Mensa Italia · OG cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── tokens ─────────────────────────────────────────────────── */
    :root {
      --blue:     oklch(38% 0.16 263);
      --blue-dp:  oklch(26% 0.13 263);
      --cyan:     oklch(78% 0.13 222);
      --ink:      oklch(15% 0.05 263);
      --ink-2:    oklch(40% 0.04 263);
      --ink-3:    oklch(55% 0.02 263);
      --bg:       oklch(98% 0.005 80);
      --line:     oklch(88% 0.005 80);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(60% 70% at 95% 0%, color-mix(in oklch, var(--cyan) 22%, transparent), transparent 65%),
        radial-gradient(50% 60% at 0% 100%, color-mix(in oklch, var(--blue) 10%, transparent), transparent 70%),
        var(--bg);
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    /* ─── frame ──────────────────────────────────────────────────── */
    .frame {
      width: 1200px;
      height: 630px;
      padding: 64px 80px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      position: relative;
    }

    /* ─── header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .mark { width: 52px; height: 52px; color: var(--blue); }
    .mark svg { width: 100%; height: 100%; display: block; }
    .brand {
      display: grid;
      line-height: 1.05;
      gap: 2px;
    }
    .brand__name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.012em;
      color: var(--ink);
    }
    .brand__tag {
      font-size: 16px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
    }

    /* ─── body ───────────────────────────────────────────────────── */
    .body {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .copy {
      display: grid;
      gap: 20px;
      align-content: center;
    }
    .kicker {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue);
    }
    .title {
      font-size: 84px;
      font-weight: 800;
      line-height: 0.97;
      letter-spacing: -0.034em;
      color: var(--ink);
      max-width: 14ch;
    }
    .title em {
      font-style: italic;
      font-weight: 500;
      color: var(--blue);
    }
    .sub {
      font-size: 30px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--ink-2);
      max-width: 22ch;
      letter-spacing: -0.005em;
    }

    /* ─── badge / logo area on the right ─────────────────────────── */
    .badge-area {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .glyph {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
      color: var(--blue);
      filter: drop-shadow(0 14px 40px color-mix(in oklch, var(--blue) 22%, transparent));
    }
    .glyph svg { width: 100%; height: 100%; display: block; }

    /* ─── footer strip ───────────────────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }
    .stats {
      display: flex;
      gap: 32px;
      font-size: 20px;
      color: var(--ink-3);
      letter-spacing: 0.005em;
    }
    .stats b {
      color: var(--ink);
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    .stats .sep { color: color-mix(in oklch, var(--ink-3) 45%, transparent); }
    .url {
      font-size: 20px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.01em;
    }
  </style>
</head>

    <footer class="footer">
