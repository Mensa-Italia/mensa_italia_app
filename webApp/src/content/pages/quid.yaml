heroKicker: La rivista dei soci
heroTitle: Quid.
heroSubtitle: Il trimestrale dei soci, scritto dai soci stessi. Sfoglialo online su quid.mensa.it. Audio narrazione, archivio completo e viewer integrato sono nell'app per soci.
ctaKicker: Vuoi scrivere su Quid?
ctaTitle: I pezzi della rivista nascono dai soci.
ctaBody: |
  Ogni numero esce con un tema (la Casa, il Tempo, la Fine…) e raccoglie saggi, narrativa, recensioni e poesia scritte direttamente dai soci. La redazione è aperta a tutti coloro che vogliono contribuire.
