heroKicker: Eventi pubblici
heroTitle: Quello che puoi venire a vedere senza essere socio.
heroSubtitle: Sessioni di test d'ammissione, conferenze aperte al pubblico, presentazioni di libri e iniziative culturali. Sono tutti eventi organizzati dai gruppi locali Mensa Italia.
ctaKicker: Per i soci
ctaTitle: "Eventi soltanto soci, una calendarizzazione fitta."
ctaBody: |
  Oltre agli eventi pubblici, Mensa Italia organizza ogni anno oltre duecento attività riservate ai soci: cene mensili, weekend tematici, gite, congressi nazionali. Tutto pubblicato nella tua area personale.
