heroKicker: Gruppi locali
heroTitle: Una comunità che si incontra davvero, vicino a te.
heroSubtitle: Venti gruppi sul territorio nazionale, dal Trentino alla Sicilia. Ognuno organizza cene mensili, conferenze, gite, weekend di giochi, gruppi di lettura. Ognuno ha un proprio team di referenti volontari.
ctaKicker: Vuoi unirti?
ctaTitle: Ogni socio appartiene al gruppo della sua regione.
ctaBody: |
  Una volta diventato socio, sei automaticamente parte del gruppo della tua regione. Puoi comunque partecipare alle attività di tutti gli altri gruppi: la tessera è una sola per tutta Italia.
