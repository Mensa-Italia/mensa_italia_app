name: Add to platform project

# Adds every newly opened issue / pull request to the org-level
# "Mensa Online" board (project #2). Requires two org secrets:
#   MENSA_PROJECT_APP_ID   – the GitHub App's App ID
#   MENSA_PROJECT_APP_KEY  – the GitHub App's private key (.pem contents)

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Mint org-scoped token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MENSA_PROJECT_APP_ID }}
          private-key: ${{ secrets.MENSA_PROJECT_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Add to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Mensa-Italia/projects/2
          github-token: ${{ steps.app-token.outputs.token }}
