name: Release

# Strategia:
#   - push a master con `[release]` nel messaggio (o workflow_dispatch) →
#     bumpa la patch in `VERSION`, builda l'immagine, la pubblica su GHCR
#     con i tag `latest` + `vX.Y.Z`, committa il bump e crea il tag git.
#   - push a feat/mvp-testing-public → builda e pubblica l'immagine con il
#     solo tag `dev` (nessun bump versione, nessun tag git, nessuna release).

on:
  push:
    branches: [master, feat/mvp-testing-public]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Quale segmento bumpare'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mensa-italia/mensa-web

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]') ||
      github.ref == 'refs/heads/feat/mvp-testing-public'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      is_release: ${{ steps.mode.outputs.is_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build mode
        id: mode
        run: |
          if [ "${{ github.ref }}" = "refs/heads/feat/mvp-testing-public" ]; then
            echo "is_mvp=true"     >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_mvp=false"    >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        if: steps.mode.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          [ -f VERSION ] || echo "0.0.0" > VERSION
          current=$(tr -d '[:space:]' < VERSION)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.bump || 'patch' }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            *)     patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped: $current -> $new"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared JS library
        run: |
          # Override del path JDK hardcoded in gradle.properties (è un path Mac locale)
          ./gradlew :shared:jsBrowserProductionLibraryDistribution \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          if [ "${{ steps.mode.outputs.is_mvp }}" = "true" ]; then
            {
              echo "tags<<EOF"
              echo "${REGISTRY}/${IMAGE_NAME}:dev"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${REGISTRY}/${IMAGE_NAME}:latest"
              echo "${REGISTRY}/${IMAGE_NAME}:v${{ steps.bump.outputs.version }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Android build (solo in modalità release) ────────────────────────────
      - name: Decode signing keystore
        if: steps.mode.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          mkdir -p androidApp/keystore
          echo "${{ secrets.KEY_JKS }}" | base64 -d > androidApp/keystore/release.jks
          # sanity check sul file
          file androidApp/keystore/release.jks

      - name: Build Android AAB + APK
        if: steps.mode.outputs.is_release == 'true'
        env:
          ANDROID_STORE_FILE: ${{ github.workspace }}/androidApp/keystore/release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ALIAS_PASSWORD }}
          ANDROID_KEY_ALIAS: key
        run: |
          ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Rename Android artifacts
        if: steps.mode.outputs.is_release == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          cp androidApp/build/outputs/bundle/release/androidApp-release.aab "mensa-italia-v${NEW_VERSION}.aab"
          cp androidApp/build/outputs/apk/release/androidApp-release.apk "mensa-italia-v${NEW_VERSION}.apk"
          ls -la mensa-italia-v*.aab mensa-italia-v*.apk

      - name: Cleanup keystore
        if: always() && steps.mode.outputs.is_release == 'true'
        run: rm -f androidApp/keystore/release.jks

      - name: Commit version bump & create tag
        if: steps.mode.outputs.is_release == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "Sipioteo"
          git config user.email "matteo@sipio.it"
          git add VERSION
          git commit -m "Release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin master --follow-tags

      - name: Create GitHub Release
        if: steps.mode.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            mensa-italia-v${{ steps.bump.outputs.version }}.aab
            mensa-italia-v${{ steps.bump.outputs.version }}.apk

  release-ios:
    needs: release
    if: needs.release.outputs.is_release == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - name: Checkout (post-bump master)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build shared Release XCFramework
        run: |
          ./gradlew :shared:assembleSharedReleaseXCFramework \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Point project.yml to Release XCFramework
        # project.yml hardcodea il path debug per l'ambiente di sviluppo locale.
        # Per la CI in modalità Release, swap debug -> release prima di xcodegen.
        run: |
          /usr/bin/sed -i '' \
            -e 's|/XCFrameworks/debug|/XCFrameworks/release|g' \
            -e 's|assembleSharedDebugXCFramework|assembleSharedReleaseXCFramework|g' \
            iosApp/project.yml
          grep -nE "XCFrameworks|assembleShared" iosApp/project.yml

      - name: Generate xcodeproj
        run: |
          cd iosApp
          xcodegen generate

      - name: Setup signing keychain
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # 1) Crea un keychain temporaneo isolato (così non tocchiamo il login.keychain)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Aggiungi al search-list senza droppare quelli esistenti
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # 2) Importa il .p12
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          echo "$P12_BASE64" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # 3) Installa il provisioning profile
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/build.mobileprovision"
          echo "$PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          # Estrai UUID e Name dal profile (servono a xcodebuild)
          /usr/libexec/PlistBuddy -c "Print :UUID" \
            /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")" > "$RUNNER_TEMP/profile.uuid"
          /usr/libexec/PlistBuddy -c "Print :Name" \
            /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")" > "$RUNNER_TEMP/profile.name"

          echo "PROFILE_UUID=$(cat "$RUNNER_TEMP/profile.uuid")" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$(cat "$RUNNER_TEMP/profile.name")" >> "$GITHUB_ENV"

          # Rename profile in posizione canonica per Xcode (UUID.mobileprovision)
          mv "$PROFILE_PATH" "$PROFILE_DIR/$(cat "$RUNNER_TEMP/profile.uuid").mobileprovision"

          echo "Installed profile: $(cat "$RUNNER_TEMP/profile.name") ($(cat "$RUNNER_TEMP/profile.uuid"))"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp

      - name: Archive
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6WA5D3RJBU \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            -allowProvisioningUpdates=NO

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>6WA5D3RJBU</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>it.mensa.app</key><string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

          ls -la "$RUNNER_TEMP/ipa"
          # Rename per consistenza con android
          cp "$RUNNER_TEMP/ipa"/*.ipa "mensa-italia-v${VERSION}.ipa"

      - name: Attach .ipa to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${VERSION}" "mensa-italia-v${VERSION}.ipa" --clobber --repo "${{ github.repository }}"

      - name: Check TestFlight config
        id: tf_check
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -n "${KEY_ID:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "TestFlight non configurato (manca APP_STORE_CONNECT_KEY_ID): skip upload"
          fi

      - name: Upload to TestFlight
        if: steps.tf_check.outputs.configured == 'true'
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/private_keys
          echo "$KEY_B64" | base64 -d > "$HOME/private_keys/AuthKey_${KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            -f "mensa-italia-v${VERSION}.ipa" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          [ -n "${KEYCHAIN_PATH:-}" ] && security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$RUNNER_TEMP/dist.p12" "$HOME/private_keys/AuthKey_"*.p8
