name: Release

# Strategia: un push a master con `[release]` nel messaggio del commit
# (oppure un workflow_dispatch manuale) bumpa la patch in `VERSION`,
# builda l'immagine Docker della web app, la pubblica su GHCR con i tag
# `latest` + `vX.Y.Z`, infine committa il bump versione e crea il tag git.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Quale segmento bumpare'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mensa-italia/mensa-web

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail
          [ -f VERSION ] || echo "0.0.0" > VERSION
          current=$(tr -d '[:space:]' < VERSION)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.bump || 'patch' }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            *)     patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped: $current -> $new"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared JS library
        run: |
          # Override del path JDK hardcoded in gradle.properties (è un path Mac locale)
          ./gradlew :shared:jsBrowserProductionLibraryDistribution \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.bump.outputs.version }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump & create tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "Sipioteo"
          git config user.email "matteo@sipio.it"
          git add VERSION
          git commit -m "Release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin master --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
