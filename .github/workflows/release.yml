name: Release

# Mode/track determinato dal messaggio di commit:
#   [ALPHA]   → web :alpha,  Play internal,    TestFlight internal
#   [BETA]    → web :beta,   Play beta,        TestFlight + gruppo "Test open"
#   [RELEASE] → web :latest, Play production,  TestFlight + submit for review
#   push su feat/mvp-testing-public → solo web :dev (niente native)
#
# Workflow_dispatch: scegli il track dalla UI Actions.
#
# DAG:
#   prepare ─┬─> web        ─┐
#            ├─> android  ─┐ │
#            │             ↓ │
#            │      play-publish (gated)
#            │                ↓
#            ├─> ios          │
#            │    ↓           │
#            │  testflight-publish (gated)
#            │                ↓
#            └─────> finalize (tag + GitHub Release con artefatti)

on:
  push:
    branches: [master, feat/mvp-testing-public]
  workflow_dispatch:
    inputs:
      track:
        description: 'Track di pubblicazione (ignorato se branch = feat/mvp-testing-public)'
        required: true
        default: 'alpha'
        type: choice
        options: [alpha, beta, production]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mensa-italia/mensa-web

jobs:
  # ─── Prepare: determina mode/track/versione, fa da fonte di verità ─────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      track: ${{ steps.mode.outputs.track }}
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      docker_tags: ${{ steps.tags.outputs.tags }}
      should_build_web: ${{ steps.mode.outputs.should_build_web }}
      should_build_native: ${{ steps.mode.outputs.should_build_native }}
      should_publish_play: ${{ steps.mode.outputs.should_publish_play }}
      should_publish_ios: ${{ steps.mode.outputs.should_publish_ios }}
      should_finalize: ${{ steps.mode.outputs.should_finalize }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine mode & track
        id: mode
        env:
          MSG: ${{ github.event.head_commit.message }}
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          INPUT_TRACK: ${{ github.event.inputs.track }}
        run: |
          set -euo pipefail
          mode="none"; track="none"
          should_build_web=false; should_build_native=false
          should_publish_play=false; should_publish_ios=false
          should_finalize=false

          # IMPORTANTE: matchare SOLO sulla prima riga del commit (subject),
          # NON sul body. Altrimenti un messaggio che DESCRIVE i token (es.
          # "Architettura con [ALPHA]/[BETA]/[RELEASE]") triggera un release
          # production reale.
          subject=$(printf '%s' "$MSG" | head -n 1)

          if [ "$EVENT" = "workflow_dispatch" ]; then
            mode="release"; track="${INPUT_TRACK:-alpha}"
          elif [ "$REF" = "refs/heads/feat/mvp-testing-public" ]; then
            mode="mvp"; track="none"
          elif printf '%s' "$subject" | grep -qE '(^|[[:space:]])\[RELEASE\]([[:space:]]|$)'; then
            mode="release"; track="production"
          elif printf '%s' "$subject" | grep -qE '(^|[[:space:]])\[BETA\]([[:space:]]|$)'; then
            mode="release"; track="beta"
          elif printf '%s' "$subject" | grep -qE '(^|[[:space:]])\[ALPHA\]([[:space:]]|$)'; then
            mode="release"; track="alpha"
          fi

          case "$mode" in
            release)
              should_build_web=true
              should_build_native=true
              should_publish_play=true
              should_publish_ios=true
              should_finalize=true
              ;;
            mvp)
              should_build_web=true
              ;;
          esac

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "track=$track" >> "$GITHUB_OUTPUT"
          echo "should_build_web=$should_build_web" >> "$GITHUB_OUTPUT"
          echo "should_build_native=$should_build_native" >> "$GITHUB_OUTPUT"
          echo "should_publish_play=$should_publish_play" >> "$GITHUB_OUTPUT"
          echo "should_publish_ios=$should_publish_ios" >> "$GITHUB_OUTPUT"
          echo "should_finalize=$should_finalize" >> "$GITHUB_OUTPUT"

          echo "::notice::Mode=$mode track=$track"

      - name: Determine version & versionCode
        id: version
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          # versionCode comune a tutti i modi: monotonico, sopra al legacy Flutter (~21M)
          commit_count=$(git rev-list --count HEAD)
          version_code=$((30000000 + commit_count))

          if [ "$MODE" = "release" ]; then
            # Trova l'ultimo tag vX.Y.Z (anche orfani) e bumpa patch.
            git fetch --tags --force --quiet
            last_tag=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
            last_version="${last_tag#v}"
            [ -z "$last_version" ] && last_version="0.0.0"
            IFS='.' read -r maj min pat <<< "$last_version"
            pat=$((pat + 1))
            version="${maj}.${min}.${pat}"
          elif [ "$MODE" = "mvp" ]; then
            version="dev-$(git rev-parse --short HEAD)"
          else
            version="0.0.0-skipped"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "::notice::version=$version versionCode=$version_code"

      - name: Compute Docker tags
        id: tags
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          TRACK: ${{ steps.mode.outputs.track }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "mvp" ]; then
            tags="${REGISTRY}/${IMAGE_NAME}:dev"
          elif [ "$MODE" = "release" ]; then
            case "$TRACK" in
              production) tags="${REGISTRY}/${IMAGE_NAME}:latest"$'\n'"${REGISTRY}/${IMAGE_NAME}:v${VERSION}" ;;
              beta)       tags="${REGISTRY}/${IMAGE_NAME}:beta"$'\n'"${REGISTRY}/${IMAGE_NAME}:v${VERSION}" ;;
              alpha)      tags="${REGISTRY}/${IMAGE_NAME}:alpha"$'\n'"${REGISTRY}/${IMAGE_NAME}:v${VERSION}" ;;
              *)          tags="" ;;
            esac
          else
            tags=""
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # ─── Web: build & push immagine GHCR ───────────────────────────────────────
  web:
    name: Web
    needs: prepare
    if: needs.prepare.outputs.should_build_web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared JS library
        run: |
          ./gradlew :shared:jsBrowserProductionLibraryDistribution \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ needs.prepare.outputs.docker_tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Android: AAB + APK firmati ────────────────────────────────────────────
  android:
    name: Android
    needs: prepare
    if: needs.prepare.outputs.should_build_native == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSION_CODE: ${{ needs.prepare.outputs.version_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Write VERSION file (per gradle)
        run: |
          echo "$VERSION" > VERSION
          echo "Building Android v$VERSION (versionCode $VERSION_CODE)"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: |
          mkdir -p androidApp/keystore
          echo "${{ secrets.KEY_JKS }}" | base64 -d > androidApp/keystore/release.jks
          file androidApp/keystore/release.jks

      - name: Build AAB + APK
        env:
          ANDROID_STORE_FILE: ${{ github.workspace }}/androidApp/keystore/release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ALIAS_PASSWORD }}
          ANDROID_KEY_ALIAS: key
        run: |
          ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            -PandroidVersionCodeOverride="$VERSION_CODE" \
            --no-daemon --stacktrace

      - name: Rename artifacts
        run: |
          cp androidApp/build/outputs/bundle/release/androidApp-release.aab "mensa-italia-v${VERSION}.aab"
          cp androidApp/build/outputs/apk/release/androidApp-release.apk "mensa-italia-v${VERSION}.apk"

      - name: Cleanup keystore
        if: always()
        run: rm -f androidApp/keystore/release.jks

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            mensa-italia-v*.aab
            mensa-italia-v*.apk
          if-no-files-found: error
          retention-days: 7

  # ─── iOS: .ipa firmato per App Store ───────────────────────────────────────
  ios:
    name: iOS
    needs: prepare
    if: needs.prepare.outputs.should_build_native == 'true'
    runs-on: macos-14
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSION_CODE: ${{ needs.prepare.outputs.version_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build shared Release XCFramework
        run: |
          ./gradlew :shared:assembleSharedReleaseXCFramework \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon --stacktrace

      - name: Point project.yml to Release XCFramework
        run: |
          /usr/bin/sed -i '' \
            -e 's|/XCFrameworks/debug|/XCFrameworks/release|g' \
            -e 's|assembleSharedDebugXCFramework|assembleSharedReleaseXCFramework|g' \
            iosApp/project.yml

      - name: Generate xcodeproj
        working-directory: iosApp
        run: xcodegen generate

      - name: Setup signing keychain
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          CERT_PATH="$RUNNER_TEMP/dist.p12"
          echo "$P12_BASE64" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -k "$KEYCHAIN_PATH" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/build.mobileprovision"
          echo "$PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          mv "$PROFILE_PATH" "$PROFILE_DIR/${UUID}.mobileprovision"

          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "::notice::Installed profile $NAME ($UUID)"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp

      - name: Archive
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=6WA5D3RJBU \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION_CODE" \
            -allowProvisioningUpdates=NO

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>6WA5D3RJBU</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>it.mensa.app</key><string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist" \
            -exportPath "$RUNNER_TEMP/ipa"
          cp "$RUNNER_TEMP/ipa"/*.ipa "mensa-italia-v${VERSION}.ipa"

      - name: Cleanup keychain
        if: always()
        run: |
          [ -n "${KEYCHAIN_PATH:-}" ] && security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$RUNNER_TEMP/dist.p12"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mensa-italia-v*.ipa
          if-no-files-found: error
          retention-days: 7

  # ─── Play Store: upload AAB sul track scelto ───────────────────────────────
  play-publish:
    name: Play (${{ needs.prepare.outputs.track }})
    needs: [prepare, android]
    if: needs.prepare.outputs.should_publish_play == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts

      - name: Map track for Play
        id: track_map
        env:
          TRACK: ${{ needs.prepare.outputs.track }}
        run: |
          case "$TRACK" in
            alpha)      play_track="internal" ;;
            beta)       play_track="beta" ;;
            production) play_track="production" ;;
            *)          echo "Unknown track $TRACK"; exit 1 ;;
          esac
          echo "play_track=$play_track" >> "$GITHUB_OUTPUT"

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: it.mensa.app
          releaseFiles: mensa-italia-v${{ needs.prepare.outputs.version }}.aab
          track: ${{ steps.track_map.outputs.play_track }}
          status: completed
          inAppUpdatePriority: 2

  # ─── TestFlight / App Store: upload + distribuzione ────────────────────────
  testflight-publish:
    name: iOS publish (${{ needs.prepare.outputs.track }})
    needs: [prepare, ios]
    if: needs.prepare.outputs.should_publish_ios == 'true'
    runs-on: macos-14
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TRACK: ${{ needs.prepare.outputs.track }}

    steps:
      - uses: actions/checkout@v4

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Setup ASC API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$KEY_B64" | base64 -d > "$HOME/private_keys/AuthKey_${KEY_ID}.p8"

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Write Fastfile
        run: |
          mkdir -p fastlane
          cat > fastlane/Fastfile <<'RUBY'
          default_platform(:ios)

          platform :ios do
            before_all do
              app_store_connect_api_key(
                key_id: ENV['ASC_KEY_ID'],
                issuer_id: ENV['ASC_ISSUER_ID'],
                key_filepath: ENV['ASC_KEY_PATH'],
                duration: 1200,
                in_house: false
              )
            end

            desc "Upload to TestFlight (internal only)"
            lane :alpha do
              upload_to_testflight(
                ipa: ENV['IPA_PATH'],
                skip_waiting_for_build_processing: false,
                skip_submission: true,
                changelog: "Build automatica #{ENV['VERSION']} (alpha)"
              )
            end

            desc "Upload to TestFlight + Test open group"
            lane :beta do
              upload_to_testflight(
                ipa: ENV['IPA_PATH'],
                skip_waiting_for_build_processing: false,
                distribute_external: true,
                groups: ["Test open"],
                changelog: "Build automatica #{ENV['VERSION']} (beta pubblica)",
                notify_external_testers: true
              )
            end

            desc "Upload + submit to App Store review"
            lane :production do
              upload_to_testflight(
                ipa: ENV['IPA_PATH'],
                skip_waiting_for_build_processing: false,
                skip_submission: true,
                changelog: "Build automatica #{ENV['VERSION']} (production)"
              )
              deliver(
                submit_for_review: true,
                automatic_release: true,
                force: true,
                skip_screenshots: true,
                skip_metadata: true,
                skip_app_version_update: false,
                precheck_include_in_app_purchases: false,
                submission_information: {
                  add_id_info_uses_idfa: false,
                  export_compliance_uses_encryption: false,
                  content_rights_contains_third_party_content: false
                }
              )
            end
          end
          RUBY

      - name: Run fastlane (${{ env.TRACK }})
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.HOME }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          IPA_PATH: ${{ github.workspace }}/mensa-italia-v${{ needs.prepare.outputs.version }}.ipa
          FASTLANE_HIDE_CHANGELOG: '1'
          FASTLANE_DISABLE_COLORS: '1'
        run: |
          fastlane ios "$TRACK"

      - name: Cleanup ASC key
        if: always()
        run: rm -f "$HOME/private_keys/AuthKey_"*.p8

  # ─── Finalize: tag + GitHub Release con tutti gli artefatti ────────────────
  finalize:
    name: Finalize
    needs: [prepare, web, android, ios, play-publish, testflight-publish]
    if: |
      always() && needs.prepare.outputs.should_finalize == 'true' &&
      needs.web.result == 'success' &&
      needs.android.result == 'success' &&
      needs.ios.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
      TRACK: ${{ needs.prepare.outputs.track }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Commit VERSION bump & tag
        run: |
          set -euo pipefail
          git config user.name "Sipioteo"
          git config user.email "matteo@sipio.it"
          echo "$VERSION" > VERSION
          git add VERSION
          if git diff --cached --quiet; then
            echo "VERSION non cambiato, skip commit"
          else
            git commit -m "Release v${VERSION} (${TRACK}) [skip ci]"
          fi
          git tag "v${VERSION}"
          git push origin master --follow-tags

      - name: Locate artifacts
        id: paths
        run: |
          aab=$(find artifacts -name '*.aab' | head -1)
          apk=$(find artifacts -name '*.apk' | head -1)
          ipa=$(find artifacts -name '*.ipa' | head -1)
          echo "aab=$aab" >> "$GITHUB_OUTPUT"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "ipa=$ipa" >> "$GITHUB_OUTPUT"
          ls -la "$aab" "$apk" "$ipa"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }} (${{ env.TRACK }})
          generate_release_notes: true
          prerelease: ${{ env.TRACK != 'production' }}
          files: |
            ${{ steps.paths.outputs.aab }}
            ${{ steps.paths.outputs.apk }}
            ${{ steps.paths.outputs.ipa }}
