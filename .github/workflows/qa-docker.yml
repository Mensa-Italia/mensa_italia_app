name: QA — Docker

on:
  push:
    branches-ignore: ['dependabot/**']
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: qa-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.web
