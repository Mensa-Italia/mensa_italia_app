name: Rescue — Flutter Android → Play Production

# Branch isolato `rescue-prod`. Builda l'ultima Flutter (commit 59c49d3d
# del 6 gennaio 2026) e la spedisce su Play Store track=production con
# versionCode 30000900 (> 30000844 attuale "halted") per scavalcare la
# release rotta.
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.x'

      - name: Decode signing keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEY_JKS }}" | base64 -d > android/app/keystore/release.jks

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB
        env:
          # Il vecchio build.gradle.kts era scritto per Codemagic e legge
          # CM_KEYSTORE_PATH/PASSWORD/KEY_ALIAS/KEY_PASSWORD quando CI=true.
          # Mappiamo i nostri secret GitHub a quei nomi.
          CM_KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore/release.jks
          CM_KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CM_KEY_ALIAS: key
          CM_KEY_PASSWORD: ${{ secrets.ALIAS_PASSWORD }}
        run: flutter build appbundle --release

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/keystore/release.jks android/key.properties

      - name: Upload to Play Store (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: it.mensa.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          inAppUpdatePriority: 5
          changesNotSentForReview: true
