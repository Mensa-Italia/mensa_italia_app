name: Quality

# Checks su ogni push e su ogni PR. Modalità blanda: i singoli linter
# possono mostrare warning/issue senza far diventare rosso il workflow.
# Pensa a questo come un radar che dice "guarda qui c'è da sistemare",
# non come un cancello.
#
# Per il cancello vero (no publish se rosso, salvo alpha) → vedi release.yml.

on:
  push:
    branches-ignore:
      - 'dependabot/**'  # dependabot ha già la sua CI
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-typecheck:
    name: Typecheck web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Build shared JS library
        run: ./gradlew :shared:jsBrowserProductionLibraryDistribution -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: webApp
      - name: Astro check (info)
        continue-on-error: true
        run: bun astro check
        working-directory: webApp

  web-lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: webApp
      - name: ESLint (warnings ammessi)
        continue-on-error: true
        run: bun run lint -- --max-warnings=9999
        working-directory: webApp

  kotlin-lint:
    name: Lint Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Install detekt-cli
        run: |
          curl -sSLO https://github.com/detekt/detekt/releases/download/v1.23.6/detekt-cli-1.23.6.zip
          unzip -q detekt-cli-1.23.6.zip
      - name: detekt (info)
        continue-on-error: true
        run: |
          ./detekt-cli-1.23.6/bin/detekt-cli \
            --input shared/src/commonMain,shared/src/androidMain,shared/src/jsMain,androidApp/src/main \
            --config detekt.yml \
            --build-upon-default-config

  swift-lint:
    name: Lint Swift
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint
      - name: SwiftLint (info)
        continue-on-error: true
        run: swiftlint lint --quiet iosApp/iosApp

  dockerfile-lint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.web
          no-fail: true
