name: Quality

# Suite di linter e security scan. Tutti i job girano in parallelo su PR e
# push a master / feat/mvp-testing-public, oppure on-demand via workflow_dispatch.
# Niente bloccante in pipeline release (li teniamo separati così non rallentano
# deploy), ma uno status verde qui significa "il codice è sano".

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, feat/mvp-testing-public]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ─── Web ──────────────────────────────────────────────────────────────────
  web-typecheck:
    name: Astro typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Build shared JS library (richiesto da Astro)
        run: ./gradlew :shared:jsBrowserProductionLibraryDistribution -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: webApp
      - name: Astro check
        run: bun astro check
        working-directory: webApp

  web-lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: webApp
      - name: ESLint
        run: bun run lint
        working-directory: webApp

  # ─── Kotlin ───────────────────────────────────────────────────────────────
  kotlin-detekt:
    name: detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Install detekt-cli
        run: |
          curl -sSLO https://github.com/detekt/detekt/releases/download/v1.23.6/detekt-cli-1.23.6.zip
          unzip -q detekt-cli-1.23.6.zip
      - name: Run detekt
        run: |
          ./detekt-cli-1.23.6/bin/detekt-cli \
            --input shared/src/commonMain,shared/src/androidMain,shared/src/jsMain,androidApp/src/main \
            --config detekt.yml \
            --report sarif:detekt.sarif.json \
            --build-upon-default-config || echo "detekt issues found (non-blocking until baseline is set)"
      - name: Upload SARIF
        if: always() && hashFiles('detekt.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: detekt.sarif.json, category: detekt }

  # ─── Swift ────────────────────────────────────────────────────────────────
  swift-lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter sarif --output swiftlint.sarif iosApp/iosApp
        continue-on-error: false
      - name: Upload SARIF
        if: always() && hashFiles('swiftlint.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: swiftlint.sarif, category: swiftlint }

  # ─── Dockerfile ───────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.web
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('hadolint.sarif') != ''
        with: { sarif_file: hadolint.sarif, category: hadolint }

  # ─── Security ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vuln-scan:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          skip-dirs: 'node_modules,webApp/node_modules,.gradle,.kotlin,build,webApp/build,shared/build,androidApp/build'
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy.sarif') != ''
        with: { sarif_file: trivy.sarif, category: trivy }
